# Documentation build check.
#
# Deployment of the docs is handled by Cloudflare Pages (Git integration on `py-numeraire/numeraire`,
# custom domain `py-numeraire.org`): Cloudflare builds and publishes on every push to `main`. This
# workflow does NOT deploy — it only builds the Sphinx site with warnings-as-errors so documentation
# regressions are caught in CI (including on pull requests, which Cloudflare's production build does
# not gate).
name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12" }
      - run: uv sync --extra docs
      - name: Build docs (warnings are errors)
        run: uv run sphinx-build -W --keep-going -b html docs docs/_build/html
